name: KYC BDD API Test Suite

# ─────────────────────────────────────────────────────────────────────────────
# Triggers
# ─────────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [ "master", "main", "develop", "feature/**", "release/**" ]
    paths:
      - "customer-onboarding KYC/customer-onboarding-KYC-TestAutomation/**"
      - "customer-onboarding KYC/customer-onboarding-KYC-backend/**"
      - ".github/workflows/kyc-bdd-api-tests.yml"
  pull_request:
    branches: [ "master", "main", "develop" ]
    paths:
      - "customer-onboarding KYC/customer-onboarding-KYC-TestAutomation/**"
      - "customer-onboarding KYC/customer-onboarding-KYC-backend/**"

  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:

# ─────────────────────────────────────────────────────────────────────────────
# Concurrency – cancel in-progress runs on the same branch/PR to save minutes
# ─────────────────────────────────────────────────────────────────────────────
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Single job: build all services in-place, start them, then run the BDD suite.
  # ─────────────────────────────────────────────────────────────────────────────
  build-and-test:
    name: Build Services & Run BDD API Tests
    runs-on: ubuntu-latest

    env:
      API_HOST:                  http://localhost
      CUSTOMER_SERVICE_PORT:     8081
      DOCUMENT_SERVICE_PORT:     8082
      KYC_SERVICE_PORT:          8083
      RISK_SERVICE_PORT:         8084
      ACCOUNT_SERVICE_PORT:      8085
      NOTIFICATION_SERVICE_PORT: 8086

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────────
      - name: Checkout source code
        uses: actions/checkout@v4.2.2

      # ── 2. Java toolchain ────────────────────────────────────────────────────
      - name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      # ── 3. Build all six microservices ───────────────────────────────────────
      - name: Build all microservices
        run: |
          set -e
          BASE="customer-onboarding KYC/customer-onboarding-KYC-backend"
          for svc in customer-service document-service kyc-service \
                     risk-service account-service notification-service; do
            echo "━━━ Building $svc ━━━"
            mvn -f "${BASE}/${svc}/pom.xml" \
                clean package -DskipTests -q --no-transfer-progress
            echo "✔ $svc built"
          done

      # ── 4. Start all six services in the background ──────────────────────────
      - name: Start all microservices
        run: |
          set -e
          BASE="customer-onboarding KYC/customer-onboarding-KYC-backend"
          PID_FILE=/tmp/service_pids.txt
          > "$PID_FILE"

          start_service() {
            local svc=$1
            local port=$2
            local jar
            jar=$(ls "${BASE}/${svc}/target/"*SNAPSHOT.jar 2>/dev/null | head -1)
            if [ -z "$jar" ]; then
              echo "ERROR: No JAR found for ${svc} in ${BASE}/${svc}/target/"
              exit 1
            fi
            java -jar "$jar" \
                 --server.port="$port" \
                 --spring.main.banner-mode=off \
                 > "/tmp/${svc}.log" 2>&1 &
            local pid=$!
            echo "$pid" >> "$PID_FILE"
            echo "▶  Started ${svc} (PID ${pid}) on port ${port}"
          }

          start_service "customer-service"     8081
          start_service "document-service"     8082
          start_service "kyc-service"          8083
          start_service "risk-service"         8084
          start_service "account-service"      8085
          start_service "notification-service" 8086

      # ── 5. Wait until every Spring Boot application context is 100% ready ────
      - name: Wait for all microservices to be ready
        run: |
          wait_for_port() {
            local port=$1
            local name=$2
            local max_wait=120     # seconds
            local waited=0

            echo "Waiting for ${name} on port ${port}..."
            until curl -sf "http://localhost:${port}/swagger-ui.html" > /dev/null 2>&1 || \
                  curl -sf "http://localhost:${port}/api-docs" > /dev/null 2>&1 || \
                  curl -sf "http://localhost:${port}/v3/api-docs" > /dev/null 2>&1; do
              if [ "$waited" -ge "$max_wait" ]; then
                echo "ERROR: ${name} did not start within ${max_wait}s"
                echo "--- last 40 lines of ${name}.log ---"
                tail -40 "/tmp/${name}.log" 2>/dev/null || true
                exit 1
              fi
              sleep 3
              waited=$((waited + 3))
            done
            echo "✔  ${name} ready (port ${port}, waited ${waited}s)"
          }

          wait_for_port 8081 "customer-service"
          wait_for_port 8082 "document-service"
          wait_for_port 8083 "kyc-service"
          wait_for_port 8084 "risk-service"
          wait_for_port 8085 "account-service"
          wait_for_port 8086 "notification-service"

      # ── 6. Run the Cucumber BDD test suite ───────────────────────────────────
      - name: Run Cucumber BDD API Tests
        working-directory: "customer-onboarding KYC/customer-onboarding-KYC-TestAutomation"
        run: |
          mvn test \
            -Dcucumber.publish.quiet=true \
            --batch-mode \
            --no-transfer-progress

      # ── 7. Publish JUnit XML to the GitHub Actions summary ───────────────────
      - name: Publish JUnit test results
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          report_paths: >-
            customer-onboarding KYC/customer-onboarding-KYC-TestAutomation/target/cucumber-reports/cucumber.xml
          fail_on_failure: true
          require_tests: false
          summary: true

      # ── 8. Upload Cucumber HTML + JSON reports as build artifacts ─────────────
      - name: Upload Cucumber test reports
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: cucumber-bdd-reports-${{ github.run_number }}
          path: |
            customer-onboarding KYC/customer-onboarding-KYC-TestAutomation/target/cucumber-reports/
          retention-days: 30
          if-no-files-found: warn

      # ── 9. Upload test log on failure ─────────────────────────────────────────
      - name: Upload test automation log
        uses: actions/upload-artifact@v4.6.2
        if: failure()
        with:
          name: test-automation-log-${{ github.run_number }}
          path: |
            customer-onboarding KYC/customer-onboarding-KYC-TestAutomation/target/cucumber-reports/test-automation.log
          retention-days: 14
          if-no-files-found: warn

      # ── 10. Upload service startup logs on failure ─────────────────────────────
      - name: Upload service startup logs
        uses: actions/upload-artifact@v4.6.2
        if: failure()
        with:
          name: service-startup-logs-${{ github.run_number }}
          path: /tmp/*.log
          retention-days: 7
          if-no-files-found: warn

      # ── 11. Stop all background services (cleanup) ────────────────────────────
      - name: Stop microservices
        if: always()
        run: |
          PID_FILE=/tmp/service_pids.txt
          if [ -f "$PID_FILE" ]; then
            while IFS= read -r pid; do
              if [ -n "$pid" ] && kill -0 "$pid" 2>/dev/null; then
                kill "$pid" 2>/dev/null || true
                echo "Stopped PID $pid"
              fi
            done < "$PID_FILE"
          fi
