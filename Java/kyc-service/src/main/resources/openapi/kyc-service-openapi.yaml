openapi: 3.0.3
info:
  title: KYC Service API
  version: v1
  description: Internal API for event-driven asynchronous KYC orchestration.
servers:
  - url: http://localhost:8083
    description: Local development server
paths:
  /api/internal/events/customer-registered:
    post:
      summary: Ingest customer registered event
      operationId: onCustomerRegistered
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomerRegisteredIngressRequest'
      responses:
        '202':
          description: Event accepted
        '400':
          description: Request validation failed
        '500':
          description: Unexpected server error
  /api/internal/events/document-uploaded:
    post:
      summary: Ingest document uploaded event
      operationId: onDocumentUploaded
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentUploadedIngressRequest'
      responses:
        '202':
          description: Event accepted
        '400':
          description: Request validation failed
        '500':
          description: Unexpected server error
components:
  schemas:
    CustomerRegisteredIngressRequest:
      type: object
      required:
        - customerId
        - occurredAt
      properties:
        customerId:
          type: string
          format: uuid
        occurredAt:
          type: string
          format: date-time
        correlationId:
          type: string
    DocumentUploadedIngressRequest:
      type: object
      required:
        - documentId
        - customerId
        - occurredAt
      properties:
        documentId:
          type: string
          format: uuid
        customerId:
          type: string
          format: uuid
        occurredAt:
          type: string
          format: date-time
        correlationId:
          type: string
