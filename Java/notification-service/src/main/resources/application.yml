server:
  port: 8086

spring:
  application:
    name: notification-service
  datasource:
    url: jdbc:mysql://localhost:3306/onboarding_notification?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    database-platform: org.hibernate.dialect.MySQLDialect
    open-in-view: false
  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.changelog-master.xml
  cache:
    type: simple
  task:
    execution:
      pool:
        core-size: 4
        max-size: 20
        queue-capacity: 200

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

cache:
  eviction:
    interval-ms: 300000

notification-provider:
  base-url: http://localhost:8091
  mock-enabled: true

resilience4j:
  circuitbreaker:
    instances:
      notificationProvider:
        sliding-window-size: 5
        minimum-number-of-calls: 3
        failure-rate-threshold: 50
  retry:
    instances:
      notificationProvider:
        max-attempts: 3
        wait-duration: 500ms
