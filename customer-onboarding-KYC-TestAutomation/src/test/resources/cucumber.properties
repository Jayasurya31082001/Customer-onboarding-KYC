# Cucumber configuration for the Customer Onboarding KYC test automation suite
# These properties are read by the Cucumber JUnit Platform Engine

cucumber.publish.quiet=true
cucumber.publish.enabled=false

# Glue path – step definitions + hooks
cucumber.glue=com.kyc.automation.steps,com.kyc.automation.hooks

# Feature file location
cucumber.features=src/test/resources/features

# Reporting plugins
cucumber.plugin=pretty,html:target/cucumber-reports/cucumber.html,json:target/cucumber-reports/cucumber.json,junit:target/cucumber-reports/cucumber.xml

# Skip scenarios tagged @wip in CI
cucumber.filter.tags=not @wip

# Snippet style for unmatched steps
cucumber.snippet-type=camelcase
